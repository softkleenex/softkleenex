<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sangjae Lee - AI/ML Roadmap Generator</title>
  <!-- Google Fonts & Pretendard -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --card-bg: rgba(13, 20, 35, 0.78);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      
      /* Tech Stack Accent Colors */
      --color-yum: #f97316;     /* Orange */
      --color-news: #64748b;    /* Slate */
      --color-silver: #a855f7;  /* Purple */
      --color-weather: #06b6d4; /* Cyan */
      --color-league: #10b981;  /* Emerald */
      --color-agent: #3b82f6;   /* Blue */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      font-family: 'Pretendard', 'Outfit', sans-serif;
      color: var(--text-main);
      width: 1200px;
      height: 600px;
      overflow: hidden;
    }

    /* Container configured for 1200x600 high resolution PNG screenshot */
    #timeline-canvas {
      width: 1200px;
      height: 600px;
      background: radial-gradient(circle at 50% 50%, #0d1527 0%, #05080e 100%);
      position: relative;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* Grid background */
    #timeline-canvas::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      pointer-events: none;
    }

    /* Header styling */
    .header {
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-subtitle {
      font-size: 13px;
      color: #38bdf8;
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 0.1em;
    }

    /* Runway Timeline Area */
    .timeline-runway {
      position: relative;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }

    /* Central Axis Line */
    .central-axis {
      position: absolute;
      left: 60px;
      width: 900px;
      top: 50%;
      height: 4px;
      background: linear-gradient(90deg, 
        rgba(249, 115, 22, 0.4) 0%, 
        rgba(168, 85, 247, 0.8) 50%, 
        rgba(59, 130, 246, 0.8) 100%
      );
      transform: translateY(-50%);
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.3);
    }

    /* Month grid alignment */
    .axis-nodes {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .month-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateX(-50%);
    }

    .node-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #0f172a;
      border: 3px solid #64748b;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      z-index: 3;
    }

    .node-dot.active {
      border-color: #a855f7;
      background: #ffffff;
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.8);
    }

    .node-label {
      position: absolute;
      top: 20px;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-sub);
      white-space: nowrap;
      background: #080c14;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .node-year {
      position: absolute;
      top: -24px;
      font-size: 10px;
      font-weight: 800;
      color: #38bdf8;
      letter-spacing: 0.05em;
    }

    /* Cards Container */
    .cards-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    /* Card styling */
    .timeline-card {
      position: absolute;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 14px;
      width: 250px;
      box-shadow: 0 10px 35px -10px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: auto;
      transform: translate(-50%, -50%);
    }

    .timeline-card::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
    }

    /* Dotted linking lines */
    .link-line {
      position: absolute;
      width: 1px;
      border-left: 1.5px dashed rgba(255, 255, 255, 0.15);
      z-index: 1;
      transform: translateX(-50%);
    }

    /* Card header & titles */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4px;
    }

    .card-title {
      font-size: 12.5px;
      font-weight: 800;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.3;
    }

    .card-date {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--accent-color);
      background: rgba(255, 255, 255, 0.04);
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .card-tagline {
      font-size: 10px;
      color: var(--text-sub);
      line-height: 1.35;
    }

    .card-badge {
      align-self: flex-start;
      font-size: 9px;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent-color);
      padding: 1px 6px;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .card-tech-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .tech-pill {
      font-size: 8.5px;
      font-weight: 600;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 1px 5px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div id="timeline-canvas">
    <!-- Header -->
    <div class="header">
      <div>
        <div class="header-title">softkleenex (이상재) AI/ML & Engineering Runway</div>
        <div class="header-subtitle">
          <span>🚀 단 9개월간 10개 이상의 고성능 AI 모델링 및 에이전트 구축</span>
        </div>
      </div>
      <div class="header-logo">PORTFOLIO TIMELINE</div>
    </div>

    <!-- Runway Timeline Area -->
    <div class="timeline-runway">
      <div class="central-axis"></div>
      
      <!-- Axis Nodes -->
      <div class="axis-nodes" id="axis-nodes-container">
        <!-- Will be filled by JavaScript -->
      </div>

      <!-- Cards & Linking Lines Container -->
      <div class="cards-container" id="cards-container">
        <!-- Will be filled by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // Project Database (Simple & Highly Maintainable!)
    const projects = [
      {
        id: "yum",
        title: "🍔 YUM:AI 아동 한식 푸드 추천",
        date: "2025.06 - 08",
        monthIndex: 0.5, // Between 06 and 08
        position: "above",
        yOffset: 90, 
        accent: "var(--color-yum)",
        tagline: "CLIP 파인튜닝 정확도 92% 달성",
        badge: "SKT Fly AI 7기 최우수",
        techs: ["OpenAI CLIP", "FastAPI", "GCP Cloud Run"]
      },
      {
        id: "news",
        title: "🚗 DACON 자동차 뉴스 분류",
        date: "2025.09",
        monthIndex: 3, 
        position: "below",
        yOffset: 90,
        accent: "var(--color-news)",
        tagline: "자체 검증 데이터셋 정확도 100%",
        badge: "자체 검증 100%",
        techs: ["GPT-4o-mini", "Few-Shot", "NLP"]
      },
      {
        id: "silver",
        title: "🎙️ SilverLink - AI 복지 도우미",
        date: "2025.11",
        monthIndex: 5,
        position: "above",
        yOffset: 90,
        accent: "var(--color-silver)",
        tagline: "음성 멀티모달 RAG 매칭 알고리즘 설계",
        badge: "KNU 해커톤 최우수상 (2등)",
        techs: ["Gemini 2.5 Pro", "RAG", "Streamlit"]
      },
      {
        id: "weather",
        title: "🌤️ Weather Life MCP v3.7",
        date: "2025.12 - 01",
        monthIndex: 6.4,
        position: "below",
        yOffset: 90,
        accent: "var(--color-weather)",
        tagline: "30개 일상 기상 툴 및 추천 맵핑 탑재",
        badge: "PlayMCP 공모전 출품작",
        techs: ["FastMCP", "Kakao Maps API", "Railway"]
      },
      {
        id: "league",
        title: "⚽ DACON K리그 패스 좌표 예측",
        date: "2025.12 - 01",
        monthIndex: 6.7,
        position: "below",
        yOffset: 175,
        accent: "var(--color-league)",
        tagline: "Delta 변위 좌표 모델링 및 Pseudo-Labeling",
        badge: "DACON 상위 7% (121위)",
        techs: ["CatBoost", "LightGBM", "Pseudo-Label"]
      },
      {
        id: "agent",
        title: "🩺 MedGemma Sentinel",
        date: "2026.02",
        monthIndex: 7.9,
        position: "above",
        yOffset: 90,
        accent: "var(--color-agent)",
        tagline: "의료진 트리아지 & 환자 기록 번역 듀얼 에이전트",
        badge: "Kaggle Impact Challenge",
        techs: ["MedGemma 1.5-4B", "FAISS RAG", "Python"]
      },
      {
        id: "aimo",
        title: "🧮 AIMO Prize 3 Solver",
        date: "2026.02",
        monthIndex: 8.2,
        position: "above",
        yOffset: 175,
        accent: "var(--color-agent)",
        tagline: "TIR 파이프라인 및 코드 에러 자가 수정 루프",
        badge: "Kaggle AIMO Solver",
        techs: ["Qwen2.5-Math", "Self-Correction", "Sandbox"]
      }
    ];

    const months = [
      { label: "06월", year: "2025" },
      { label: "07월", year: "" },
      { label: "08월", year: "" },
      { label: "09월", year: "" },
      { label: "10월", year: "" },
      { label: "11월", year: "" },
      { label: "12월", year: "" },
      { label: "01월", year: "2026" },
      { label: "02월", year: "" }
    ];

    const axisNodesContainer = document.getElementById("axis-nodes-container");
    const cardsContainer = document.getElementById("cards-container");

    // Timeline math
    const timelineStart = 60;  // Timeline line starts at 60px
    const timelineEnd = 960;   // Timeline line ends at 960px (leaves 240px on the right for Feb cards)
    const timelineWidth = timelineEnd - timelineStart;
    const step = timelineWidth / (months.length - 1);

    const axisY = 270; // Hardcoded middle of timeline-runway

    // 1. Render Axis Nodes
    months.forEach((m, idx) => {
      const node = document.createElement("div");
      node.className = "month-node";
      
      const x = timelineStart + idx * step;
      node.style.left = `${x}px`;
      node.style.top = `${axisY}px`;
      
      const isActive = m.label === "06월" || m.label === "09월" || m.label === "11월" || m.label === "12월" || m.label === "02월";
      
      let yearHtml = "";
      if (m.year) {
        yearHtml = `<div class="node-year">${m.year}</div>`;
      }

      node.innerHTML = `
        ${yearHtml}
        <div class="node-dot ${isActive ? 'active' : ''}"></div>
        <div class="node-label">${m.label}</div>
      `;
      axisNodesContainer.appendChild(node);
    });

    // 2. Render Cards & Linking Lines
    projects.forEach(p => {
      // Calculate exact X position on timeline based on monthIndex
      const x = timelineStart + p.monthIndex * step;
      
      let cardY = 0;
      if (p.position === "above") {
        cardY = axisY - p.yOffset;
      } else {
        cardY = axisY + p.yOffset;
      }

      // Create card element
      const card = document.createElement("div");
      card.className = "timeline-card";
      card.style.left = `${x}px`;
      card.style.top = `${cardY}px`;
      card.style.setProperty("--accent-color", p.accent);

      let techHtml = p.techs.map(t => `<span class="tech-pill">${t}</span>`).join("");
      let badgeHtml = p.badge ? `<div class="card-badge">${p.badge}</div>` : "";

      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${p.title}</div>
          <div class="card-date">${p.date}</div>
        </div>
        <div class="card-tagline">${p.tagline}</div>
        ${badgeHtml}
        <div class="card-tech-pills">
          ${techHtml}
        </div>
      `;
      cardsContainer.appendChild(card);

      // Create vertical linking line
      const link = document.createElement("div");
      link.className = "link-line";
      link.style.left = `${x}px`;
      
      if (p.position === "above") {
        const cardBottom = cardY + 52; 
        link.style.top = `${cardBottom}px`;
        link.style.height = `${axisY - cardBottom}px`;
      } else {
        const cardTop = cardY - 52;
        link.style.top = `${axisY}px`;
        link.style.height = `${cardTop - axisY}px`;
      }
      
      cardsContainer.appendChild(link);
    });
  </script>
</body>
</html>
