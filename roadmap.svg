<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="100%" height="100%">
  <defs>
    <!-- Fonts & Styling -->
    <style>
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 22px;
        fill: #f8fafc;
        letter-spacing: -0.03em;
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 500;
        font-size: 13px;
        fill: #38bdf8;
        letter-spacing: -0.01em;
      }
      .axis-label {
        font-family: "Segoe UI", Roboto, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #94a3b8;
        letter-spacing: -0.02em;
      }
      .year-label {
        font-family: "Segoe UI", Roboto, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 11px;
        fill: #3b82f6;
        letter-spacing: 0.05em;
      }
      .bar-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #ffffff;
        letter-spacing: -0.02em;
      }
      .bar-subtitle {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 600;
        font-size: 9px;
        fill: #e2e8f0;
        opacity: 0.95;
      }
      .bar-item {
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s ease;
        cursor: pointer;
      }
      .bar-item:hover {
        transform: translateY(-2px);
        filter: brightness(1.15) drop-shadow(0 0 10px rgba(59, 130, 246, 0.35));
      }
    </style>

    <!-- Glowing Filters -->
    <filter id="glow-axis" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="bar-shadow" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#060911" />
      <stop offset="100%" stop-color="#020306" />
    </linearGradient>

    <linearGradient id="axis-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="20%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="80%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Frosted-glass Border Gradients -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.2" />
    </linearGradient>

    <!-- Capsule Color Gradients -->
    <linearGradient id="yum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="news-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="weather-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="league-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="agent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="ml-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#be185d" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="460" rx="16" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Grid Runway Pattern (Tech styling) -->
  <g opacity="0.04">
    <path d="M 0,50 L 1000,50 M 0,100 L 1000,100 M 0,150 L 1000,150 M 0,200 L 1000,200 M 0,250 L 1000,250 M 0,300 L 1000,300 M 0,350 L 1000,350 M 0,400 L 1000,400" stroke="#ffffff" stroke-width="1" />
    <!-- 9 Chronological Columns -->
    <path d="M 100,0 L 100,460 M 190,0 L 190,460 M 280,0 L 280,460 M 370,0 L 370,460 M 460,0 L 460,460 M 550,0 L 550,460 M 640,0 L 640,460 M 730,0 L 730,460 M 820,0 L 820,460 M 910,0 L 910,460" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Header Titles -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">softkleenex (이상재) AI/ML &amp; Engineering Runway</text>
    <text class="subtitle" x="0" y="22">🚀 단 9개월간 10개 이상의 고성능 AI 모델링 및 에이전트 구축을 달성한 하이덴시티(High-Density) 성장 로드맵</text>
  </g>

  <!-- Central Time Axis Runway (y = 230) -->
  <g>
    <!-- Axis Runway Line -->
    <line x1="50" y1="230" x2="940" y2="230" stroke="url(#axis-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow-axis)" />
    
    <!-- Time Ticks / Nodes -->
    <!-- Column 1: Jun (2025.06) x = 100 -->
    <circle cx="100" cy="230" r="5" fill="#3b82f6" stroke="#090d16" stroke-width="2" />
    <text class="year-label" x="100" y="210" text-anchor="middle">2025</text>
    <text class="axis-label" x="100" y="252" text-anchor="middle">06월</text>

    <!-- Column 2: Jul (2025.07) x = 190 -->
    <circle cx="190" cy="230" r="5" fill="#3b82f6" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="190" y="252" text-anchor="middle">07월</text>

    <!-- Column 3: Aug (2025.08) x = 280 -->
    <circle cx="280" cy="230" r="5" fill="#3b82f6" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="280" y="252" text-anchor="middle">08월</text>

    <!-- Column 4: Sep (2025.09) x = 370 -->
    <circle cx="370" cy="230" r="5" fill="#3b82f6" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="370" y="252" text-anchor="middle">09월</text>

    <!-- Column 5: Oct (2025.10) x = 460 -->
    <circle cx="460" cy="230" r="5" fill="#8b5cf6" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="460" y="252" text-anchor="middle">10월</text>

    <!-- Column 6: Nov (2025.11) x = 550 -->
    <circle cx="550" cy="230" r="5" fill="#8b5cf6" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="550" y="252" text-anchor="middle">11월</text>

    <!-- Column 7: Dec (2025.12) x = 640 -->
    <circle cx="640" cy="230" r="5" fill="#ec4899" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="640" y="252" text-anchor="middle">12월</text>

    <!-- Column 8: Jan (2026.01) x = 730 -->
    <circle cx="730" cy="230" r="5" fill="#ec4899" stroke="#090d16" stroke-width="2" />
    <text class="year-label" x="730" y="210" text-anchor="middle">2026</text>
    <text class="axis-label" x="730" y="252" text-anchor="middle">01월</text>

    <!-- Column 9: Feb (2026.02) x = 820 -->
    <circle cx="820" cy="230" r="5" fill="#f43f5e" stroke="#090d16" stroke-width="2" />
    <text class="axis-label" x="820" y="252" text-anchor="middle">02월</text>
  </g>

  <!-- Connectors (Dotted lines linking the duration bars to time coordinates) -->
  <g stroke="#334155" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <!-- YUM:AI (Col 1 to 3) -->
    <path d="M 90,170 L 90,230 M 360,170 L 360,230" />
    <!-- DACON News (Col 4) -->
    <path d="M 370,270 L 370,230 M 460,270 L 460,230" />
    <!-- ML Ensemble (Col 4 to 5) -->
    <path d="M 370,350 L 370,230 M 550,350 L 550,230" />
    <!-- SilverLink (Col 6) -->
    <path d="M 550,90 L 550,230 M 640,90 L 640,230" />
    <!-- Weather Life (Col 7 to 8) -->
    <path d="M 640,270 L 640,230 M 820,270 L 820,230" />
    <!-- K-League (Col 7 to 8) -->
    <path d="M 640,350 L 640,230 M 820,350 L 820,230" />
    <!-- MedGemma & AIMO (Col 9) -->
    <path d="M 820,170 L 820,230 M 910,170 L 910,230" />
    <path d="M 820,90 L 820,230 M 910,90 L 910,230" />
  </g>

  <!-- ==================== STACKED DURATION ARROWS/BARS ==================== -->

  <!-- ABOVE AXIS: ROW A2 (y = 70) -->
  
  <!-- 🎙️ SilverLink 복지 도우미 (Nov 2025 - Col 6: x=550 to 640) -->
  <g class="bar-item" transform="translate(550, 70)" filter="url(#bar-shadow)">
    <rect width="90" height="38" rx="8" fill="url(#silver-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Vector Wave Icon -->
    <path d="M 12,19 L 14,14 L 16,24 L 18,16 L 20,22" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
    <text class="bar-title" x="25" y="18">SilverLink</text>
    <text class="bar-subtitle" x="25" y="28">🏆 KNU 해커톤 2등</text>
  </g>

  <!-- 🧮 AIMO Prize 3 Solver (Feb 2026 - Col 9: x=820 to 910) -->
  <g class="bar-item" transform="translate(820, 70)" filter="url(#bar-shadow)">
    <rect width="90" height="38" rx="8" fill="url(#ml-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Math Spark Icon -->
    <path d="M 14,15 L 16,18 L 19,19 L 16,20 L 14,23 L 13,20 L 10,19 L 13,18 Z" fill="#ffffff" />
    <text class="bar-title" x="24" y="18">AIMO Solver</text>
    <text class="bar-subtitle" x="24" y="28">수학 자율에이전트</text>
  </g>


  <!-- ABOVE AXIS: ROW A1 (y = 150) -->
  
  <!-- 🍔 YUM:AI 푸드 추천 (Jun - Aug 2025 - Col 1 to 3: x=90 to 360) -->
  <g class="bar-item" transform="translate(90, 150)" filter="url(#bar-shadow)">
    <rect width="270" height="38" rx="8" fill="url(#yum-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Vector Plate Icon -->
    <circle cx="20" cy="19" r="6" fill="none" stroke="#ffffff" stroke-width="1.2" />
    <path d="M 18,19 H 22 M 20,17 V 21" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
    <text class="bar-title" x="32" y="18">🍔 YUM:AI 아동 푸드 추천 시스템 (FastAPI &amp; GCP)</text>
    <text class="bar-subtitle" x="32" y="28">OpenAI CLIP 파인튜닝 (정확도 92% 달성) · SKT Fly AI 7기 최우수 수료</text>
  </g>

  <!-- 🩺 MedGemma Sentinel (Feb 2026 - Col 9: x=820 to 910) -->
  <g class="bar-item" transform="translate(820, 150)" filter="url(#bar-shadow)">
    <rect width="90" height="38" rx="8" fill="url(#agent-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Med Cross Icon -->
    <path d="M 11,19 H 17 M 14,16 V 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <text class="bar-title" x="24" y="18">MedGemma</text>
    <text class="bar-subtitle" x="24" y="28">의료 RAG 에이전트</text>
  </g>


  <!-- BELOW AXIS: ROW B1 (y = 270) -->
  
  <!-- 🚗 DACON 자동차 뉴스 분류 (Sep 2025 - Col 4: x=370 to 460) -->
  <g class="bar-item" transform="translate(370, 270)" filter="url(#bar-shadow)">
    <rect width="90" height="38" rx="8" fill="url(#news-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Document Icon -->
    <path d="M 11,15 H 17 V 23 H 11 Z M 13,18 H 15" fill="none" stroke="#ffffff" stroke-width="1.2" />
    <text class="bar-title" x="24" y="18">뉴스 분류 AI</text>
    <text class="bar-subtitle" x="24" y="28">자체검증 100%</text>
  </g>

  <!-- 🌤️ Weather Life MCP v3.7 (Dec 2025 - Jan 2026 - Col 7 to 8: x=640 to 820) -->
  <g class="bar-item" transform="translate(640, 270)" filter="url(#bar-shadow)">
    <rect width="180" height="38" rx="8" fill="url(#weather-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Server Icon -->
    <path d="M 12,17 H 20 V 22 H 12 Z M 10,20 C 10,18 22,18 22,20" fill="none" stroke="#ffffff" stroke-width="1.2" />
    <text class="bar-title" x="28" y="18">🌤️ Weather Life MCP v3.7</text>
    <text class="bar-subtitle" x="28" y="28">FastMCP 30개 커스텀 툴 및 API 통합 · 공모전 출품작</text>
  </g>


  <!-- BELOW AXIS: ROW B2 (y = 350) -->
  
  <!-- 📈 ML 앙상블 분석 확장 (Sep - Oct 2025 - Col 4 to 5: x=370 to 550) -->
  <g class="bar-item" transform="translate(370, 350)" filter="url(#bar-shadow)">
    <rect width="180" height="38" rx="8" fill="url(#news-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#84cc16" />
    <!-- Trend Chart Icon -->
    <path d="M 10,24 L 14,19 L 18,22 L 22,16" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    <text class="bar-title" x="28" y="18">📈 ML 앙상블 CTR &amp; 시계열 분석</text>
    <text class="bar-subtitle" x="28" y="28">센서 피처 149개 설계 · Walk-Forward CV 차단</text>
  </g>

  <!-- ⚽ DACON K리그 패스 좌표 예측 (Dec 2025 - Jan 2026 - Col 7 to 8: x=640 to 820) -->
  <g class="bar-item" transform="translate(640, 350)" filter="url(#bar-shadow)">
    <rect width="180" height="38" rx="8" fill="url(#league-grad)" stroke="url(#glass-border)" stroke-width="1.2" />
    <rect width="3" height="38" rx="1.5" fill="#ffffff" />
    <!-- Coordinate Target Icon -->
    <circle cx="16" cy="19" r="5" fill="none" stroke="#ffffff" stroke-width="1.2" />
    <circle cx="16" cy="19" r="1.5" fill="#ffffff" />
    <text class="bar-title" x="28" y="18">⚽ K리그 패스 좌표 예측 (상위 7%)</text>
    <text class="bar-subtitle" x="28" y="28">Delta 변화량 예측 기법 및 준지도 Pseudo-Labeling</text>
  </g>

</svg>
